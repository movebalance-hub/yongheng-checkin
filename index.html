<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>永衡運動工作室 · 入場</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      font-size: 13px;
      letter-spacing: 0.2em;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .card {
      width: 100%;
      max-width: 340px;
      background: #141414;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      border: 1px solid #222;
    }

    .status-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }

    .status-icon.loading {
      background: #1a1a1a;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-icon.valid {
      background: rgba(34, 197, 94, 0.15);
      border: 2px solid rgba(34, 197, 94, 0.4);
    }

    .status-icon.invalid {
      background: rgba(239, 68, 68, 0.15);
      border: 2px solid rgba(239, 68, 68, 0.4);
    }

    .status-icon.unregistered {
      background: rgba(234, 179, 8, 0.15);
      border: 2px solid rgba(234, 179, 8, 0.4);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .member-name {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #fff;
    }

    .member-type {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #22c55e;
      margin-bottom: 24px;
    }

    .divider {
      height: 1px;
      background: #222;
      margin: 24px 0;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .info-label {
      font-size: 12px;
      color: #555;
      letter-spacing: 0.05em;
    }

    .info-value {
      font-size: 13px;
      color: #ccc;
      font-weight: 500;
    }

    .status-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .status-sub {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }

    .timestamp {
      margin-top: 32px;
      font-size: 11px;
      color: #333;
      letter-spacing: 0.05em;
    }

    .valid .status-text { color: #22c55e; }
    .invalid .status-text { color: #ef4444; }
    .unregistered .status-text { color: #eab308; }
  </style>
</head>
<body>

<div class="logo">永衡運動工作室</div>

<div class="card" id="card">
  <div class="status-icon loading" id="icon">⏳</div>
  <div class="status-text" id="statusText">驗證中...</div>
  <div class="status-sub" id="statusSub">請稍候</div>
</div>

<div class="timestamp" id="timestamp"></div>

<script>
  const SUPABASE_URL = 'https://wcjxtrlugszykhisjtdj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indjanh0cmx1Z3N6eWtoaXNqdGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3ODY0MTcsImV4cCI6MjA5NzM2MjQxN30.IfLAYfAFxM1JmNa-B0Z6j1WZ_ThjdTy7TeBlb-TrQok';
  const LIFF_ID = '2010442104-qupAUvIj';

  const memberTypeLabel = {
    'single_month': '單月會員',
    'monthly': '月訂閱',
    'annual': '年會員'
  };

  async function supabaseQuery(table, filters = {}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?`;
    const params = Object.entries(filters).map(([k, v]) => `${k}=eq.${encodeURIComponent(v)}`);
    url += params.join('&');
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    return res.json();
  }

  async function logCheckin(memberId, memberName) {
    await fetch(`${SUPABASE_URL}/rest/v1/checkin_logs`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ member_id: memberId })
    });
  }

  function showResult(type, data = {}) {
    const icon = document.getElementById('icon');
    const statusText = document.getElementById('statusText');
    const statusSub = document.getElementById('statusSub');
    const card = document.getElementById('card');

    icon.className = `status-icon ${type}`;

    if (type === 'valid') {
      icon.textContent = '✓';
      statusText.textContent = data.name;
      statusText.className = 'member-name';

      const typeLabel = document.createElement('div');
      typeLabel.className = 'member-type';
      typeLabel.textContent = memberTypeLabel[data.membership_type] || data.membership_type;
      statusText.after(typeLabel);

      const divider = document.createElement('div');
      divider.className = 'divider';
      typeLabel.after(divider);

      const rows = [
        ['到期日', data.expires_at],
        ['今日入場', new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })]
      ];

      rows.forEach(([label, value]) => {
        const row = document.createElement('div');
        row.className = 'info-row';
        row.innerHTML = `<span class="info-label">${label}</span><span class="info-value">${value}</span>`;
        divider.after(row);
      });

      statusSub.remove();

    } else if (type === 'invalid') {
      icon.textContent = '✕';
      statusText.className = 'status-text';
      statusText.textContent = '會員已過期';
      statusSub.textContent = `到期日：${data.expires_at}\n請聯繫工作室續費`;

    } else if (type === 'unregistered') {
      icon.textContent = '?';
      statusText.className = 'status-text';
      statusText.textContent = '尚未綁定會員';
      statusSub.textContent = '請聯繫工作室完成會員綁定';
    }

    const now = new Date();
    document.getElementById('timestamp').textContent =
      now.toLocaleDateString('zh-TW') + ' · ' + now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  async function main() {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      const lineUid = profile.userId;

      const members = await supabaseQuery('members', { line_uid: lineUid });

      if (!members || members.length === 0) {
        showResult('unregistered');
        return;
      }

      const member = members[0];
      const today = new Date().toISOString().split('T')[0];
      const isValid = member.expires_at >= today;

      if (isValid) {
        await logCheckin(member.id, member.name);
        showResult('valid', member);
      } else {
        showResult('invalid', member);
      }

    } catch (err) {
      document.getElementById('statusText').textContent = '系統錯誤';
      document.getElementById('statusSub').textContent = err.message;
      console.error(err);
    }
  }

  main();
</script>
</body>
</html>
